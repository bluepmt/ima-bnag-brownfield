# Cloudflare Pages + Functions config
# Local dev:  npx wrangler pages dev .
# (Production bindings are set in the Cloudflare dashboard â†’ Pages â†’ Settings)

name = "ima-brownfield"
pages_build_output_dir = "."
compatibility_date = "2024-09-23"

# --- D1 database binding (env.DB) ---
# Replace database_id with the id printed by:  npx wrangler d1 create ima_db
[[d1_databases]]
binding = "DB"
database_name = "ima_db"
database_id = "b7ef851e-2f09-497f-9d25-38b5bef1b73f"

# --- Progress source: a PUBLIC Google Sheet (gviz CSV). No secrets needed. ---
# Set SHEETS_ID in the Pages dashboard (or .dev.vars locally), not here, so it
# is easy to change without a code commit. Example shown commented out.
[vars]
# SHEETS_ID = "1AbC...XYZ"        # spreadsheet id from its URL (/d/<ID>/edit)
# SHEETS_TABLES = "KPI,Phase,Sections,Variance,Milestones,Engineering,Procurement,SCurve,WPInfo"  # optional override
